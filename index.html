<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tsuky</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Josefin+Sans:wght@100;200;300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ink: #0d0d0f;
    --paper: #f5f0e8;
    --blush: #c9a882;
    --accent: #8b5e3c;
    --mist: rgba(13,13,15,0.06);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Josefin Sans', sans-serif;
    overflow: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    position: fixed;
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease;
    mix-blend-mode: multiply;
  }
  .cursor-ring {
    position: fixed;
    width: 32px; height: 32px;
    border: 1px solid var(--blush);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: all 0.25s ease;
    mix-blend-mode: multiply;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.35;
  }

  /* Decorative lines */
  .line-h {
    position: fixed;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--blush), transparent);
    opacity: 0;
    animation: fadeIn 1.8s ease forwards;
  }
  .line-h.top { top: 60px; left: 10%; width: 80%; animation-delay: 0.4s; }
  .line-h.bottom { bottom: 60px; left: 10%; width: 80%; animation-delay: 0.6s; }

  .line-v {
    position: fixed;
    width: 1px;
    background: linear-gradient(to bottom, transparent, var(--blush), transparent);
    opacity: 0;
    animation: fadeIn 1.8s ease forwards;
  }
  .line-v.left { left: 60px; top: 10%; height: 80%; animation-delay: 0.5s; }
  .line-v.right { right: 60px; top: 10%; height: 80%; animation-delay: 0.7s; }

  /* Corner marks */
  .corner {
    position: fixed;
    width: 18px; height: 18px;
    opacity: 0;
    animation: fadeIn 1.4s ease forwards;
  }
  .corner::before, .corner::after {
    content: '';
    position: absolute;
    background: var(--accent);
  }
  .corner::before { width: 100%; height: 1px; top: 0; left: 0; }
  .corner::after  { width: 1px; height: 100%; top: 0; left: 0; }

  .corner.tl { top: 30px; left: 30px; animation-delay: 0.2s; }
  .corner.tr { top: 30px; right: 30px; transform: scaleX(-1); animation-delay: 0.3s; }
  .corner.bl { bottom: 30px; left: 30px; transform: scaleY(-1); animation-delay: 0.4s; }
  .corner.br { bottom: 30px; right: 30px; transform: scale(-1); animation-delay: 0.5s; }

  /* Main layout */
  main {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .eyebrow {
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 100;
    font-size: 0.65rem;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--blush);
    opacity: 0;
    transform: translateY(12px);
    animation: rise 1.2s cubic-bezier(0.16,1,0.3,1) forwards;
    animation-delay: 0.8s;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(5rem, 14vw, 10rem);
    line-height: 0.9;
    letter-spacing: -0.02em;
    color: var(--ink);
    opacity: 0;
    transform: translateY(20px);
    animation: rise 1.4s cubic-bezier(0.16,1,0.3,1) forwards;
    animation-delay: 1s;
    position: relative;
    user-select: none;
  }

  h1 em {
    font-style: italic;
    color: var(--accent);
  }

  /* Floating dot accent */
  h1::after {
    content: '·';
    position: absolute;
    bottom: 0.1em;
    right: -0.2em;
    font-size: 1.4em;
    color: var(--blush);
    animation: pulse 3s ease-in-out infinite;
    animation-delay: 2.5s;
  }

  .tagline {
    margin-top: 2rem;
    font-weight: 200;
    font-size: 0.72rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(13,13,15,0.4);
    opacity: 0;
    transform: translateY(10px);
    animation: rise 1.2s cubic-bezier(0.16,1,0.3,1) forwards;
    animation-delay: 1.4s;
  }

  /* Horizontal divider */
  .divider {
    width: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--accent), transparent);
    margin: 2.5rem auto;
    animation: expand 1s ease forwards;
    animation-delay: 1.7s;
  }

  /* Background orbital ring */
  .orbit {
    position: fixed;
    border-radius: 50%;
    border: 1px solid rgba(139,94,60,0.08);
    pointer-events: none;
    animation: slowSpin linear infinite;
  }
  .orbit:nth-child(1) { width: 520px; height: 520px; top: 50%; left: 50%; margin: -260px 0 0 -260px; animation-duration: 60s; }
  .orbit:nth-child(2) { width: 340px; height: 340px; top: 50%; left: 50%; margin: -170px 0 0 -170px; animation-duration: 40s; animation-direction: reverse; border-color: rgba(201,168,130,0.12); }

  /* Floating glyph */
  .glyph {
    position: fixed;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--mist);
    pointer-events: none;
    user-select: none;
    animation: drift ease-in-out infinite;
  }
  .glyph.a { font-size: 18rem; top: -5%; left: -3%; animation-duration: 14s; animation-delay: 0s; }
  .glyph.b { font-size: 10rem; bottom: -2%; right: 0%; animation-duration: 18s; animation-delay: -5s; }

  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }
  @keyframes expand { to { width: 120px; } }
  @keyframes slowSpin { to { transform: rotate(360deg); } }
  @keyframes drift {
    0%, 100% { transform: translateY(0px) rotate(-2deg); }
    50% { transform: translateY(-18px) rotate(2deg); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>

<div class="cursor" id="cur"></div>
<div class="cursor-ring" id="ring"></div>

<!-- Decorative structure -->
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>
<div class="line-h top"></div>
<div class="line-h bottom"></div>
<div class="line-v left"></div>
<div class="line-v right"></div>

<!-- Background elements -->
<div class="orbit"></div>
<div class="orbit"></div>
<div class="glyph a">T</div>
<div class="glyph b">月</div>

<main>
  <p class="eyebrow">Bienvenue sur</p>
  <h1>Ts<em>u</em>ky</h1>
  <div class="divider"></div>
  <p class="tagline">Page officielle &nbsp;·&nbsp; Est. 2024</p>
</main>

<script>
  const cur = document.getElementById('cur');
  const ring = document.getElementById('ring');
  let mx = 0, my = 0, rx = 0, ry = 0;

  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

  (function loop() {
    rx += (mx - rx) * 0.12;
    ry += (my - ry) * 0.12;
    cur.style.left = mx + 'px';
    cur.style.top = my + 'px';
    ring.style.left = rx + 'px';
    ring.style.top = ry + 'px';
    requestAnimationFrame(loop);
  })();
</script>
</body>
</html>
